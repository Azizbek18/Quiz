<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Testi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Agar alohida .css fayl ochishni xohlamasangiz, 
           oldingi javobimda bergan CSS kodlarni shu yerga qo'yishingiz mumkin */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #F8F9FA; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .back-btn { cursor: pointer; color: #6c757d; }
        .timer { background-color: #E2E9EC; border-radius: 15px; padding: 8px 15px; border: none; font-weight: bold; }
        .progress-bar { width: 100%; background-color: #494BD6; height: 4px; }
        .main-content { display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .question-header { text-align: center; margin-bottom: 40px; }
        .question-header p { color: #6c757d; margin-bottom: 10px; }
        .question-text { font-size: 28px; color: #333; }
        #tanlash { list-style: none; display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center; }
        #tanlash li { 
            background: white; 
            width: 400px; 
            padding: 15px 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #tanlash li:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 1px solid #494BD6; }
        #tanlash li span { font-weight: bold; color: #494BD6; }
        #tanlash button { border: none; background: none; font-size: 18px; cursor: pointer; width: 100%; text-align: left; }
        .footer { display: flex; justify-content: space-around; width: 100%; margin-top: 50px; align-items: center; }
        .skip-text { color: #6c757d; cursor: pointer; }
        #keyingi { background-color: #494BD6; color: white; padding: 12px 30px; border-radius: 15px; border: none; cursor: pointer; font-size: 16px; }
        #keyingi:hover { background-color: #3a3bb1; }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <p class="back-btn">← orqaga</p>
            <h2 class="text-2xl">Matematika testi</h2>
            <button class="timer">04:32</button>
        </header>

        <div class="progress-bar"></div>

        <main class="main-content">
            <div class="question-header">
                <p>8-savol</p>
                <h1 id="savolMatni" class="question-text">2³ + 3² ning qiymati nechaga teng?</h1>
            </div>

            <ul id="tanlash">
                <li id="option-a">
                    <span>A)</span>
                    <button>17</button>
                </li>
                <li id="option-b">
                    <span>B)</span>
                    <button>67</button>
                </li>
                <li id="option-c">
                    <span>C)</span>
                    <button>52</button>
                </li>
                <li id="option-d">
                    <span>D)</span>
                    <button>69</button>
                </li>
            </ul>

            <footer class="footer">
                <p class="skip-text">O'tkazib yuborish</p>
                <button id="keyingi">Keyingi 👉</button>
            </footer>
        </main>
    </div>

    <script src="./testlar.js"></script>
</body>
</html>
