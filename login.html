<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster - Register</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="circles">
        <div class="circle1"></div>
        <div class="circle2"></div>
        <div class="circle3"></div>
    </div>

    <div class="box">
        <div class="yozuv">
            <div class="icon-header"><i class="fas fa-brain"></i></div>
            <h1>Ro'yxatdan O'tish</h1>
            <p>Bilimlar olamiga xush kelibsiz!</p>
        </div>

        <div class="input-container">
            <div class="inp1">      
                <i class="fas fa-user"></i>
                <input id="ism" type="text" placeholder="Ismingiz">
            </div>
            <div class="inp1">
                <i class="fas fa-envelope"></i>
                <input id="email" type="email" placeholder="Email manzilingiz">
            </div>
            <div class="inp1">
                <i class="fas fa-lock"></i>
                <input id="parol" type="password" placeholder="Parol yarating">
            </div>
            <div class="inp1">
                <i class="fas fa-shield-alt"></i>
                <input class="inp" type="password" placeholder="Parolni tasdiqlang">
            </div>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="terms">
            <label for="terms">Foydalanish shartlariga roziman</label>
        </div>

        <button onclick="yaratish()" class="btn1">
            <span>Hisob yaratish</span>
            <i class="fas fa-rocket"></i>
        </button>
    </div>

    <div class="xabar-con"></div>
    <script src="./login.js"></script>
</body>
</html>
