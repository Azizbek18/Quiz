<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster - Kirish</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="circles">
        <div class="circle1"></div>
        <div class="circle2"></div>
    </div>

    <div class="xabar-con"></div>

    <div class="box">
        <div class="yozuv">
            <div class="icon-header"><i class="fas fa-user-lock"></i></div>
            <h1>Kirish</h1>
            <p>Hisobingizga kiring</p>
        </div>

        <div class="input-container">
            <div class="inp-wrapper">
                <i class="fas fa-envelope"></i>
                <input id="email" type="email" placeholder="Email@example.com">
            </div>
            <div class="inp-wrapper">
                <i class="fas fa-key"></i>
                <input id="parol" type="password" placeholder="Parolingiz">
            </div>
        </div>

        <button onclick="Tekshirish()" class="btn-main">
            <span>Tizimga kirish</span>
            <i class="fas fa-sign-in-alt"></i>
        </button>

        <div class="footer-text">
            Hisobingiz yo'qmi? <a href="index.html">Ro'yxatdan o'ting</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
